name: Build TUO docs

on:
  repository_dispatch:
    types: [update-docs]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Starlight Repo
        uses: actions/checkout@v4

      - name: Clone Repo A (TazUO)
        run: |
          git clone https://github.com/BCrowly/TazUO.git dev

      - name: Copy generated markdown files
        run: |
          mkdir -p src/content/docs/legion
          cp -r dev/src/ClassicUO.Client/LegionScripting/docs/* src/content/docs/legion/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Astro dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
